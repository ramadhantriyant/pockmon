  # ────────────────────────────────────────────────────────────────────────────
  # Transfers
  # ────────────────────────────────────────────────────────────────────────────
  /api/transfer:
    get:
      summary: List transfers
      tags: [Transfers]
      responses:
        '200':
          description: Transfer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  transfer:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transfer'
    post:
      summary: Create transfer between accounts
      description: Updates both account balances atomically.
      tags: [Transfers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_account_id, to_account_id, amount, transfer_date]
              properties:
                from_account_id:
                  type: string
                  format: uuid
                to_account_id:
                  type: string
                  format: uuid
                amount:
                  type: number
                  format: double
                to_amount:
                  type: number
                  format: double
                  description: Amount received in destination currency (defaults to `amount` if same currency)
                exchange_rate:
                  type: number
                  format: double
                  description: Defaults to 1.0
                transfer_date:
                  type: string
                  format: date
                description:
                  type: string
      responses:
        '201':
          description: Created transfer
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  transfer:
                    $ref: '#/components/schemas/Transfer'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/transfer/{id}:
    get:
      summary: Get transfer
      tags: [Transfers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transfer
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  transfer:
                    $ref: '#/components/schemas/Transfer'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete transfer
      description: Reverses both account balance changes atomically.
      tags: [Transfers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
