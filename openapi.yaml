  # ────────────────────────────────────────────────────────────────────────────
  # Attachments
  # ────────────────────────────────────────────────────────────────────────────
  /api/transaction/{id}/attachment:
    get:
      summary: List attachments for a transaction
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  attachments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attachment'
    post:
      summary: Confirm attachment after direct GCS upload
      description: >
        Step 3 of the upload flow. After the client PUT-uploads the file to the
        signed GCS URL, call this endpoint to record the attachment in the DB.
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_name, file_path]
              properties:
                file_name:
                  type: string
                file_path:
                  type: string
                  description: GCS object path returned by the upload-url endpoint
                file_type:
                  type: string
                  example: application/pdf
                file_size:
                  type: integer
      responses:
        '201':
          description: Created attachment with signed download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  attachment:
                    $ref: '#/components/schemas/Attachment'
                  download_url:
                    type: string

  /api/transaction/{id}/attachment/upload-url:
    get:
      summary: Get signed PUT URL for direct upload
      description: >
        Step 1 of the upload flow. Returns a signed GCS PUT URL valid for
        15 minutes. The client uploads directly to GCS — the file never passes
        through this API server.
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: file_name
          in: query
          required: true
          schema:
            type: string
          example: receipt.pdf
        - name: file_type
          in: query
          required: true
          schema:
            type: string
          example: application/pdf
      responses:
        '200':
          description: Signed upload URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  upload_url:
                    type: string
                    description: Signed GCS PUT URL (15-minute expiry)
                  object_path:
                    type: string
                    description: GCS object path to pass to the confirm endpoint

  /api/attachment/{id}:
    get:
      summary: Get attachment with signed download URL
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attachment with download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  attachment:
                    $ref: '#/components/schemas/Attachment'
                  download_url:
                    type: string
                    description: Signed GCS GET URL (1-hour expiry)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete attachment
      description: Deletes the GCS object and the DB record.
